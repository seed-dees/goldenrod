<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Skulptur - WebXR med Reglage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Control Panel */
        #controlPanel {
            position: fixed;
            left: 20px;
            top: 20px;
            width: 320px;
            max-height: 90vh;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-size: 12px;
            z-index: 100;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #controlPanel h3 {
            color: #2196F3;
            margin-bottom: 12px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .control-group {
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group:last-child {
            border-bottom: none;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .control-label-text {
            color: rgba(255, 255, 255, 0.7);
            font-weight: bold;
        }

        .control-value {
            color: #4CAF50;
            font-family: monospace;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
            margin: 6px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2196F3;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(33, 150, 243, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2196F3;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 4px rgba(33, 150, 243, 0.5);
        }

        input[type="number"] {
            width: 60px;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
        }

        input[type="color"] {
            width: 40px;
            height: 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 4px;
        }

        button:hover {
            background: #45a049;
        }

        /* Info Panel */
        #info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            font-size: 12px;
            max-width: 250px;
            z-index: 100;
        }

        #info h3 {
            color: #4CAF50;
            margin-bottom: 8px;
            font-size: 12px;
        }

        #arStatus {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            z-index: 100;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-top: 3px;
            background: #f44336;
            color: white;
        }

        .status-badge.active {
            background: #4CAF50;
        }

        #arButton {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            z-index: 100;
            transition: background 0.3s;
        }

        #arButton:hover:not(:disabled) {
            background: #1976D2;
        }

        #arButton:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(244, 67, 54, 0.95);
            color: white;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            z-index: 2000;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Initialiserar AR...</p>
    </div>

    <!-- Control Panel -->
    <div id="controlPanel">
        <h3>🎛️ Skulptur-reglage</h3>

        <!-- GPS Position -->
        <div class="control-group">
            <div class="control-label">
                <span class="control-label-text">📍 Latitude</span>
                <span class="control-value" id="latValue">0.00</span>
            </div>
            <input type="range" id="latitude" min="-90" max="90" step="0.001" value="0">

            <div class="control-label">
                <span class="control-label-text">📍 Longitude</span>
                <span class="control-value" id="lonValue">0.00</span>
            </div>
            <input type="range" id="longitude" min="-180" max="180" step="0.001" value="0">
        </div>

        <!-- Position -->
        <div class="control-group">
            <div class="control-label">
                <span class="control-label-text">⬆️ Höjd (Y)</span>
                <span class="control-value" id="heightValue">0.00</span>
            </div>
            <input type="range" id="height" min="-5" max="5" step="0.1" value="0">
            <div style="font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px;">
                X: <input type="number" id="posX" min="-10" max="10" step="0.1" value="0" style="width: 45px;">
                Z: <input type="number" id="posZ" min="-10" max="10" step="0.1" value="-2" style="width: 45px;">
            </div>
        </div>

        <!-- Skala -->
        <div class="control-group">
            <div class="control-label">
                <span class="control-label-text">📏 Skala</span>
                <span class="control-value" id="scaleValue">0.50</span>
            </div>
            <input type="range" id="scale" min="0.1" max="3" step="0.1" value="0.5">
        </div>

        <!-- Färg -->
        <div class="control-group">
            <div class="control-label">
                <span class="control-label-text">🎨 Färg</span>
                <input type="color" id="color" value="#ffffff">
            </div>
            <div style="font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px;">
                RGB: <span id="colorValue">#ffffff</span>
            </div>
        </div>

        <!-- Opacitet -->
        <div class="control-group">
            <div class="control-label">
                <span class="control-label-text">👁️ Opacitet</span>
                <span class="control-value" id="opacityValue">100%</span>
            </div>
            <input type="range" id="opacity" min="0" max="100" step="1" value="100">
        </div>

        <!-- Rotation -->
        <div class="control-group">
            <div class="control-label">
                <span class="control-label-text">🔄 Rotation (Y)</span>
                <span class="control-value" id="rotationValue">0.003</span>
            </div>
            <input type="range" id="rotationSpeed" min="0" max="0.02" step="0.001" value="0.003">
        </div>

        <!-- Sparning -->
        <div class="control-group">
            <button onclick="saveSettings()">💾 Spara inställningar</button>
            <button onclick="resetSettings()">🔄 Återställ</button>
        </div>
    </div>

    <!-- AR Status -->
    <div id="arStatus">
        <div>WebXR: <span class="status-badge" id="webxrStatus">Ej initierad</span></div>
        <div style="margin-top: 4px;">FPS: <span id="fps">60</span></div>
    </div>

    <!-- Info -->
    <div id="info" style="display: none;">
        <h3>✓ AR Aktiv</h3>
        <p>Skulpturen är synlig.</p>
    </div>

    <!-- AR Button -->
    <button id="arButton" disabled>Startar...</button>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Main Application -->
    <script>
        let scene, camera, renderer, model, xrSession = null;
        const canvas = document.getElementById('canvas');
        const loadingScreen = document.getElementById('loading');
        const arButton = document.getElementById('arButton');

        let modelMaterial = null;
        let rotationSpeed = 0.003;

        // Settings structure
        const settings = {
            latitude: 0,
            longitude: 0,
            posX: 0,
            posY: 0,
            posZ: -2,
            scale: 0.5,
            color: '#ffffff',
            opacity: 100,
            rotationSpeed: 0.003
        };

        // Load settings from localStorage
        function loadSettings() {
            const saved = localStorage.getItem('arSculptureSettings');
            if (saved) {
                Object.assign(settings, JSON.parse(saved));
                updateUIFromSettings();
            }
        }

        function saveSettings() {
            localStorage.setItem('arSculptureSettings', JSON.stringify(settings));
            console.log('✓ Inställningar sparade');
            alert('Inställningar sparade!');
        }

        function resetSettings() {
            localStorage.removeItem('arSculptureSettings');
            location.reload();
        }

        function updateUIFromSettings() {
            document.getElementById('latitude').value = settings.latitude;
            document.getElementById('longitude').value = settings.longitude;
            document.getElementById('posX').value = settings.posX;
            document.getElementById('posZ').value = settings.posZ;
            document.getElementById('height').value = settings.posY;
            document.getElementById('scale').value = settings.scale;
            document.getElementById('color').value = settings.color;
            document.getElementById('opacity').value = settings.opacity;
            document.getElementById('rotationSpeed').value = settings.rotationSpeed;
            updateControlLabels();
        }

        // Initialize Three.js
        function initThree() {
            scene = new THREE.Scene();
            scene.background = null;

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                alpha: true,
                antialias: true,
                preserveDrawingBuffer: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType('local');

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            loadModel();

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(animate);
        }

        function loadModel() {
            const loader = new THREE.GLTFLoader();
            const modelPath = 'assets/sculpture.glb';

            loader.load(
                modelPath,
                (gltf) => {
                    model = gltf.scene;

                    // Apply material for color control
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;

                            // Store original material
                            const originalMaterial = child.material;

                            // Create new material with properties
                            child.material = new THREE.MeshStandardMaterial({
                                color: new THREE.Color(settings.color),
                                metalness: 0.3,
                                roughness: 0.4
                            });
                            child.material.transparent = true;
                            child.material.opacity = settings.opacity / 100;
                        }
                    });

                    updateModelFromSettings();
                    scene.add(model);
                    document.getElementById('loading').style.display = 'none';
                    console.log('✓ Modell laddad');
                },
                undefined,
                (error) => {
                    console.error('Error:', error);
                }
            );
        }

        function updateModelFromSettings() {
            if (!model) return;

            // Position
            model.position.set(settings.posX, settings.posY, settings.posZ);

            // Scale
            model.scale.set(settings.scale, settings.scale, settings.scale);

            // Color & Opacity
            model.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.color.set(settings.color);
                    child.material.opacity = settings.opacity / 100;
                }
            });

            rotationSpeed = settings.rotationSpeed;
        }

        function animate() {
            if (model) {
                model.rotation.y += rotationSpeed;
            }
            renderer.render(scene, camera);
            updateFPS();
        }

        function updateFPS() {
            // FPS update code (simplified)
            document.getElementById('fps').textContent = '60';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateControlLabels() {
            document.getElementById('latValue').textContent = settings.latitude.toFixed(3);
            document.getElementById('lonValue').textContent = settings.longitude.toFixed(3);
            document.getElementById('heightValue').textContent = settings.posY.toFixed(2);
            document.getElementById('scaleValue').textContent = settings.scale.toFixed(2);
            document.getElementById('opacityValue').textContent = settings.opacity + '%';
            document.getElementById('rotationValue').textContent = settings.rotationSpeed.toFixed(4);
            document.getElementById('colorValue').textContent = settings.color;
        }

        // Event Listeners for Controls
        document.getElementById('latitude').addEventListener('input', (e) => {
            settings.latitude = parseFloat(e.target.value);
            document.getElementById('latValue').textContent = settings.latitude.toFixed(3);
        });

        document.getElementById('longitude').addEventListener('input', (e) => {
            settings.longitude = parseFloat(e.target.value);
            document.getElementById('lonValue').textContent = settings.longitude.toFixed(3);
        });

        document.getElementById('height').addEventListener('input', (e) => {
            settings.posY = parseFloat(e.target.value);
            if (model) model.position.y = settings.posY;
            document.getElementById('heightValue').textContent = settings.posY.toFixed(2);
        });

        document.getElementById('posX').addEventListener('input', (e) => {
            settings.posX = parseFloat(e.target.value);
            if (model) model.position.x = settings.posX;
        });

        document.getElementById('posZ').addEventListener('input', (e) => {
            settings.posZ = parseFloat(e.target.value);
            if (model) model.position.z = settings.posZ;
        });

        document.getElementById('scale').addEventListener('input', (e) => {
            settings.scale = parseFloat(e.target.value);
            if (model) model.scale.set(settings.scale, settings.scale, settings.scale);
            document.getElementById('scaleValue').textContent = settings.scale.toFixed(2);
        });

        document.getElementById('color').addEventListener('input', (e) => {
            settings.color = e.target.value;
            if (model) {
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.color.set(settings.color);
                    }
                });
            }
            document.getElementById('colorValue').textContent = settings.color;
        });

        document.getElementById('opacity').addEventListener('input', (e) => {
            settings.opacity = parseFloat(e.target.value);
            if (model) {
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.opacity = settings.opacity / 100;
                    }
                });
            }
            document.getElementById('opacityValue').textContent = settings.opacity + '%';
        });

        document.getElementById('rotationSpeed').addEventListener('input', (e) => {
            settings.rotationSpeed = parseFloat(e.target.value);
            rotationSpeed = settings.rotationSpeed;
            document.getElementById('rotationValue').textContent = settings.rotationSpeed.toFixed(4);
        });

        // WebXR Setup
        async function initWebXR() {
            try {
                if (!navigator.xr) {
                    throw new Error('WebXR stöds inte');
                }

                const isARSupported = await navigator.xr.isSessionSupported('immersive-ar');
                if (!isARSupported) {
                    throw new Error('AR stöds inte');
                }

                arButton.disabled = false;
                arButton.textContent = 'Starta AR';
                document.getElementById('webxrStatus').textContent = 'Redo';
                document.getElementById('webxrStatus').className = 'status-badge active';

                arButton.addEventListener('click', startAR);
            } catch (error) {
                console.error('WebXR Error:', error);
                arButton.disabled = true;
                arButton.textContent = 'AR stöds inte';
            }
        }

        async function startAR() {
            try {
                arButton.disabled = true;
                xrSession = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test', 'dom-overlay'],
                    domOverlay: { root: document.body }
                });

                document.getElementById('info').style.display = 'block';
                document.getElementById('webxrStatus').textContent = 'Aktivt';
                document.getElementById('webxrStatus').className = 'status-badge active';

                xrSession.addEventListener('end', onSessionEnded);
                await renderer.xr.setSession(xrSession);
            } catch (error) {
                console.error('Error:', error);
                arButton.disabled = false;
            }
        }

        function onSessionEnded() {
            xrSession = null;
            document.getElementById('info').style.display = 'none';
            arButton.disabled = false;
            document.getElementById('webxrStatus').textContent = 'Stoppad';
            document.getElementById('webxrStatus').className = 'status-badge';
        }

        // Initialize
        window.addEventListener('load', () => {
            loadSettings();
            initThree();
            initWebXR();
        });
    </script>
</body>
</html>
